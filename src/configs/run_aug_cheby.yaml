defaults:
  - problem: mokp
  - scalarization: aug_cheby
  - override hydra/job_logging: disabled
  - _self_

n_iterations: 100
rseed: 123
time_limit: 100
from_pid: 1
to_pid: 3
optimizer: gurobi

compute_stats_upto: 100
hypervolume:
  approx: false
  eps: 0.1
  delta: 0.1
  normalize: true

hydra:
  run:
    dir: .
  output_subdir: null
